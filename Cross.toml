[build.env]
# Pass through GHA cache env vars for sccache to use GHA backend
# (may not work inside Docker container, fallback is SCCACHE_DIR)
passthrough = [
  "RUSTFLAGS",
  "RUSTC_BOOTSTRAP",
  "SCCACHE_GHA_ENABLED",
  "ACTIONS_RESULTS_URL",
  "ACTIONS_RUNTIME_TOKEN",
  "ACTIONS_CACHE_URL",
]

# Mount host /tmp so sccache's disk cache persists across container runs
volumes = ["/tmp=/tmp"]

# Use clang as the C/C++ compiler to avoid the aws-lc-sys GCC memcmp bug
# https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189
[build.dockerfile]
file = ".cross/Dockerfile"
