[build.env]
# Pass through GHA cache API env vars so sccache inside the cross
# container can use GHA cache as its backend (instead of local disk).
passthrough = [
  "RUSTFLAGS",
  "RUSTC_BOOTSTRAP",
  "SCCACHE_GHA_ENABLED",
  "ACTIONS_RESULTS_URL",
  "ACTIONS_RUNTIME_TOKEN",
  "ACTIONS_CACHE_URL",
]

# Use clang as the C/C++ compiler to avoid the aws-lc-sys GCC memcmp bug
# https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189
[build.dockerfile]
file = ".cross/Dockerfile"
