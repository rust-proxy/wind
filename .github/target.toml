# Wind Build Target Configuration
# This file defines the build targets and configurations used in CI/CD workflows

# [[target]]
# os = ""                       # GitHub runner OS (e.g., ubuntu-latest, windows-latest, macos-14)
# target = ""                   # Rust target triple (e.g., x86_64-unknown-linux-gnu)
# release-name = ""             # Name for release artifacts (e.g., x86_64-linux)
# tool = ""                     # Optional: Build tool (e.g., "cross" for cross-compilation)
# postfix = ""                  # Optional: Filename suffix (e.g., ".exe" for Windows, or ".dylib/.so" for libraries)
# skip-test = false             # Optional: Skip testing phase (true/false)
# extra-args = ""               # Optional: Additional cargo flags (e.g., features)
# toolchain = ""                # Optional: Custom Rust toolchain (defaults to inputs.rust-toolchain)
# components = ""               # Optional: Rust components to install (defaults to 'rustfmt, clippy')
# rustflags = ""                # Optional: Custom Rust compiler flags
# retention-days = 3            # Optional: Number of days to retain artifacts
# nasm = false                  # Optional: Whether to install NASM for assembly compilation
# zig = "2.17"                  # Optional: Zig libc version for linking (if needed)

# ==================== Linux Targets (GNU) ====================

# 64-bit Linux (GNU)
[[target]]
os = "ubuntu-latest"
target = "x86_64-unknown-linux-gnu"
release-name = "x86_64-linux"
extra-args = "--features tuic-server/quiche"
tool = "cross"

# 32-bit Linux (GNU)
[[target]]
os = "ubuntu-latest"
target = "i686-unknown-linux-gnu"
release-name = "i686-linux"
extra-args = "--features tuic-server/quiche"
tool = "cross"

# ==================== Linux Targets (GNU, static CRT) ====================
#
# These replace the former `*-unknown-linux-musl` targets. The pinned quinn
# fork's `quinn-udp` fails to compile against musl's libc (a `u32`/`usize`
# field-width mismatch in `linux.rs`), so build against glibc and statically
# link the CRT (`-C target-feature=+crt-static`) to keep a self-contained
# binary for the (alpine-based) Docker images and release archives.
#
# NOTE: a statically-linked glibc cannot load NSS modules, so `getaddrinfo`
# (the `System` DNS resolver, `tokio::net::lookup_host`) does not work at
# runtime. Configure a network resolver instead (`[dns] mode = "cloudflare-tls"`
# etc.), which resolves over the wire via hickory and bypasses NSS.

# 64-bit Linux (glibc, statically-linked CRT)
[[target]]
os = "ubuntu-latest"
target = "x86_64-unknown-linux-gnu"
release-name = "x86_64-linux-static"
extra-args = "--features tuic-server/quiche"
rustflags = "--cfg reqwest_unstable -C target-feature=+crt-static"
tool = "cross"

# 32-bit Linux (glibc, statically-linked CRT)
# [[target]]
# os = "ubuntu-latest"
# target = "i686-unknown-linux-gnu"
# release-name = "i686-linux-static"
# rustflags = "--cfg reqwest_unstable -C target-feature=+crt-static"
# tool = "cross"

# ==================== ARM Linux Targets (GNU) ====================

# ARM64 Linux (GNU)
[[target]]
os = "ubuntu-latest"
target = "aarch64-unknown-linux-gnu"
release-name = "aarch64-linux"
extra-args = "--features tuic-server/quiche"
tool = "cross"

# ARMv7 Linux (GNU - soft float ABI)
[[target]]
os = "ubuntu-latest"
target = "armv7-unknown-linux-gnueabi"
release-name = "armv7-linux"
extra-args = "--features tuic-server/quiche"
tool = "cross"

# ARMv7 Linux (GNU - hard float ABI)
[[target]]
os = "ubuntu-latest"
target = "armv7-unknown-linux-gnueabihf"
release-name = "armv7-linux-hf"
extra-args = "--features tuic-server/quiche"
tool = "cross"

# ==================== ARM Linux Targets (GNU, static CRT) ====================
#
# glibc + static CRT, replacing the musl variants (see the x86_64 static-CRT
# note above for the rationale and the static-glibc DNS caveat).

# ARM64 Linux (glibc, statically-linked CRT)
[[target]]
os = "ubuntu-latest"
target = "aarch64-unknown-linux-gnu"
release-name = "aarch64-linux-static"
extra-args = "--features tuic-server/quiche"
rustflags = "--cfg reqwest_unstable -C target-feature=+crt-static"
tool = "cross"

# ARMv7 Linux (glibc, statically-linked CRT - soft float ABI)
# [[target]]
# os = "ubuntu-latest"
# target = "armv7-unknown-linux-gnueabi"
# release-name = "armv7-linux-static"
# rustflags = "--cfg reqwest_unstable -C target-feature=+crt-static"
# tool = "cross"

# ARMv7 Linux (glibc, statically-linked CRT - hard float ABI)
# [[target]]
# os = "ubuntu-latest"
# target = "armv7-unknown-linux-gnueabihf"
# release-name = "armv7-linux-static-hf"
# rustflags = "--cfg reqwest_unstable -C target-feature=+crt-static"
# tool = "cross"

# ==================== Windows Targets ====================

# 64-bit Windows
[[target]]
os = "windows-latest"
target = "x86_64-pc-windows-msvc"
release-name = "x86_64-windows"
extra-args = "--features tuic-server/quiche"
postfix = ".exe"

# 32-bit Windows
[[target]]
os = "windows-latest"
target = "i686-pc-windows-msvc"
release-name = "i686-windows"
extra-args = "--features tuic-server/quiche"
postfix = ".exe"

# ARM64 Windows
[[target]]
os = "windows-latest"
target = "aarch64-pc-windows-msvc"
release-name = "aarch64-windows"
extra-args = "--features tuic-server/quiche"
postfix = ".exe"
skip-test = true

# ==================== macOS Targets ====================

# Intel macOS (x86_64)
[[target]]
os = "macos-15-intel"
target = "x86_64-apple-darwin"
release-name = "x86_64-darwin"
extra-args = "--features tuic-server/quiche"
mold = true

# Apple Silicon macOS (ARM64)
[[target]]
os = "macos-latest"
target = "aarch64-apple-darwin"
release-name = "aarch64-darwin"
extra-args = "--features tuic-server/quiche"
